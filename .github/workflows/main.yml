# ════════════════════════════════════════════════════════════════════
#  🌍 GEO — Automated Stream Viewer Pipeline
#  ────────────────────────────────────────────
#  Provisions a hardened, geo-aware browser environment on every run.
#  Brave browser  •  Cloudflare WARP VPN  •  Xvfb virtual display
# ════════════════════════════════════════════════════════════════════

name: 🌍 GEO Pipeline

on:
  schedule:
    - cron: "*/5 * * * *"          # Every 5 minutes
  workflow_dispatch:                # Manual trigger from Actions tab

# ──────────────────────────────────────────────────────────────────
#  GLOBAL
# ──────────────────────────────────────────────────────────────────
env:
  PY_COLORS: "1"
  PYTHONUNBUFFERED: "1"            # Real-time log output

jobs:
  viewer:
    name: 🖥️ Launch Viewer (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 600

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.13"]

    steps:

    # ╔══════════════════════════════════════════════════════════════╗
    # ║  1 · CHECKOUT & PYTHON                                     ║
    # ╚══════════════════════════════════════════════════════════════╝
    - name: 📥 Checkout repository
      uses: actions/checkout@v4

    - name: 🐍 Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    # ╔══════════════════════════════════════════════════════════════╗
    # ║  2 · SYSTEM DEPENDENCIES & LOCALE                          ║
    # ╚══════════════════════════════════════════════════════════════╝
    - name: 🌐 Configure locale (en_US.UTF-8)
      run: |
        echo "────────────────────────────────────────"
        echo "  Setting system locale to en_US.UTF-8  "
        echo "────────────────────────────────────────"
        sudo apt-get install -y --no-install-recommends tzdata locales
        sudo locale-gen en_US.UTF-8
        sudo localectl set-locale LANG="en_US.UTF-8"
        export LANG="en_US.UTF-8"
        sudo update-locale

        echo ""
        echo "✅ Locale verification:"
        locale
        localectl status
      shell: bash

    - name: 📦 Install system packages
      run: |
        sudo apt-get update -y
        sudo apt-get install -y --no-install-recommends \
          curl \
          gnupg \
          apt-transport-https \
          xvfb \
          xdg-utils
      shell: bash

    # ╔══════════════════════════════════════════════════════════════╗
    # ║  3 · BRAVE BROWSER INSTALLATION                            ║
    # ╚══════════════════════════════════════════════════════════════╝
    - name: 🦁 Install Brave Browser
      run: |
        echo "╔═══════════════════════════════════════╗"
        echo "║   Installing Brave Browser (stable)   ║"
        echo "╚═══════════════════════════════════════╝"

        # Import Brave signing key
        sudo curl -fsSLo /usr/share/keyrings/brave-browser-archive-keyring.gpg \
          https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg

        # Add Brave repository
        echo "deb [signed-by=/usr/share/keyrings/brave-browser-archive-keyring.gpg] \
          https://brave-browser-apt-release.s3.brave.com/ stable main" \
          | sudo tee /etc/apt/sources.list.d/brave-browser-release.list > /dev/null

        # Install
        sudo apt-get update -y
        sudo apt-get install -y --no-install-recommends brave-browser

        echo ""
        echo "✅ Brave installed successfully"
      shell: bash

    - name: 🦁 Verify Brave installation
      run: |
        echo "── Binary location ──"
        which brave-browser || which brave-browser-stable
        echo ""
        echo "── Version info ──"
        brave-browser --version || brave-browser-stable --version
        echo ""
        echo "✅ Brave is ready"
      shell: bash

    # ╔══════════════════════════════════════════════════════════════╗
    # ║  4 · CLOUDFLARE WARP VPN                                   ║
    # ╚══════════════════════════════════════════════════════════════╝
    - name: 🔒 Install Cloudflare WARP
      run: |
        echo "╔═══════════════════════════════════════╗"
        echo "║   Setting up Cloudflare WARP VPN      ║"
        echo "╚═══════════════════════════════════════╝"

        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
          | sudo gpg --yes --dearmor \
              --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg

        echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] \
          https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" \
          | sudo tee /etc/apt/sources.list.d/cloudflare-client.list

        sudo apt-get update -y
        sudo apt-get install -y --no-install-recommends cloudflare-warp

        echo ""
        echo "✅ WARP client installed"
      shell: bash

    - name: 🔒 Connect to WARP
      run: |
        sudo warp-cli --accept-tos registration new
        sudo warp-cli --accept-tos mode warp+doh
        sudo warp-cli --accept-tos connect
        sleep 5

        echo "── Connection status ──"
        sudo warp-cli status
      shell: bash

    - name: 🔒 Verify WARP tunnel
      run: |
        echo "── Cloudflare trace ──"
        TRACE=$(curl -s https://www.cloudflare.com/cdn-cgi/trace)
        echo "$TRACE"
        echo ""

        if echo "$TRACE" | grep -q "warp=on"; then
          echo "✅ Traffic is routed through WARP"
        else
          echo "⚠️  WARP flag not detected — continuing anyway"
        fi

        echo ""
        echo "── Public IP ──"
        curl -s https://ipinfo.io/json | python -m json.tool
      shell: bash

    # ╔══════════════════════════════════════════════════════════════╗
    # ║  5 · PYTHON DEPENDENCIES                                   ║
    # ╚══════════════════════════════════════════════════════════════╝
    - name: 📦 Install Python dependencies
      run: |
        python -m pip install --upgrade pip wheel setuptools

        pip install --upgrade \
          seleniumbase \
          pyautogui \
          pymongo \
          python-xlib \
          rich

        echo ""
        echo "✅ Python packages installed"
        pip list --format=columns | head -30
      shell: bash

    - name: 🔧 Install chromedriver (SeleniumBase)
      run: |
        seleniumbase install chromedriver
        echo "✅ Chromedriver ready"
      shell: bash

    # ╔══════════════════════════════════════════════════════════════╗
    # ║  6 · PRE-FLIGHT TESTS (non-blocking)                      ║
    # ╚══════════════════════════════════════════════════════════════╝
    - name: 🧪 Test · Python environment
      continue-on-error: true
      run: |
        echo "── Python version ──"
        python --version
        echo ""
        echo "── SeleniumBase version ──"
        python -c "import seleniumbase; print(seleniumbase.__version__)"
        echo ""
        echo "── Rich import test ──"
        python -c "from rich.console import Console; Console().print('[green]✅ Rich OK[/]')"
      shell: bash

    - name: 🧪 Test · Network connectivity
      continue-on-error: true
      run: |
        echo "── DNS resolution ──"
        nslookup www.twitch.tv || echo "⚠️  DNS lookup failed"
        echo ""
        echo "── HTTP reachability ──"
        curl -sI -o /dev/null -w "Twitch:  HTTP %{http_code}  (%{time_total}s)\n" https://www.twitch.tv
        curl -sI -o /dev/null -w "GeoAPI:  HTTP %{http_code}  (%{time_total}s)\n" http://ip-api.com/json/
        echo ""
        echo "✅ Network tests complete"
      shell: bash

    - name: 🧪 Test · Brave headless smoke test
      continue-on-error: true
      run: |
        echo "Launching Brave in headless mode for 3 seconds…"
        timeout 10 brave-browser \
          --headless=new \
          --no-sandbox \
          --disable-gpu \
          --dump-dom \
          "https://example.com" 2>/dev/null | head -5
        echo ""
        echo "✅ Brave headless test passed"
      shell: bash

    - name: 🧪 Test · Xvfb virtual display
      continue-on-error: true
      run: |
        echo "Starting Xvfb on :99…"
        Xvfb :99 -screen 0 1920x1080x24 &
        export DISPLAY=:99
        sleep 2

        if [ -n "$(pgrep Xvfb)" ]; then
          echo "✅ Xvfb is running (PID: $(pgrep Xvfb))"
        else
          echo "⚠️  Xvfb failed to start"
        fi

        # Clean up — the main script will start its own via --xvfb
        pkill Xvfb || true
      shell: bash

    - name: 🧪 Test · geo.py dry import
      continue-on-error: true
      run: |
        python -c "
        import ast, sys
        with open('geo.py', 'r') as f:
            try:
                ast.parse(f.read())
                print('✅ geo.py syntax is valid')
            except SyntaxError as e:
                print(f'❌ Syntax error: {e}')
                sys.exit(1)
        "
      shell: bash

    # ╔══════════════════════════════════════════════════════════════╗
    # ║  7 · MAIN EXECUTION                                        ║
    # ╚══════════════════════════════════════════════════════════════╝
    - name: 🚀 Run geo.py
      run: |
        echo "╔═══════════════════════════════════════╗"
        echo "║        🌍  Starting GEO Viewer        ║"
        echo "╚═══════════════════════════════════════╝"
        echo ""
        python geo.py \
          --brave \
          --incognito \
          --do-not-track \
          --xvfb \
          --screenshot
      shell: bash

    # ╔══════════════════════════════════════════════════════════════╗
    # ║  8 · ARTIFACTS                                             ║
    # ╚══════════════════════════════════════════════════════════════╝
    - name: 📸 Upload screenshots
      if: always()                  # Upload even if the run step failed
      uses: actions/upload-artifact@v4
      with:
        name: seleniumbase-screenshots-${{ github.run_number }}
        path: ./latest_logs/
        retention-days: 1
        if-no-files-found: ignore

    # ╔══════════════════════════════════════════════════════════════╗
    # ║  9 · CLEANUP                                               ║
    # ╚══════════════════════════════════════════════════════════════╝
    - name: 🧹 Disconnect WARP
      if: always()
      run: |
        sudo warp-cli disconnect 2>/dev/null || true
        echo "✅ WARP disconnected"
      shell: bash
